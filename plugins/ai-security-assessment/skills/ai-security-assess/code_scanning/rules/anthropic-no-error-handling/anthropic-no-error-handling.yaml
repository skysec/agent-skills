rules:
  - id: anthropic-no-error-handling
    languages: [python]
    severity: WARNING
    message: >-
      Anthropic API call without error handling. Wrap API calls in try/except to
      handle rate limits, API errors, and network issues gracefully.
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      category: security
      confidence: MEDIUM
      technology: [anthropic]
      references:
        - https://docs.anthropic.com/en/api/messages
    patterns:
      - pattern: $CLIENT.messages.create(...)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
  - id: anthropic-no-error-handling-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Anthropic API call without error handling. Wrap API calls in try/catch to
      handle rate limits, API errors, and network issues gracefully.
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      category: security
      confidence: MEDIUM
      technology: [anthropic]
      references:
        - https://docs.anthropic.com/en/api/messages
    patterns:
      - pattern-either:
          - pattern: await $CLIENT.messages.create({...})
          - pattern: $CLIENT.messages.create({...})
      - pattern-not-inside: |
          try {
              ...
          } catch ($ERR) {
              ...
          }
