rules:
  - id: cohere-no-error-handling
    languages: [python]
    severity: WARNING
    message: >-
      Cohere API call without error handling. Wrap API calls in try/except to
      handle rate limits, API errors, and network issues gracefully.
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      category: security
      confidence: MEDIUM
      technology: [cohere]
      references:
        - https://docs.cohere.com/docs/safety-modes
    patterns:
      - pattern-either:
          - pattern: $CLIENT.chat(...)
          - pattern: $CLIENT.chat_stream(...)
      - pattern-inside: |
          $CLIENT = cohere.Client(...)
          ...
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
