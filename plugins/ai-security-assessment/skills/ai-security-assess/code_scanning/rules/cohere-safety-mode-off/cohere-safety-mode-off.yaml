rules:
  - id: cohere-safety-mode-off-python
    languages: [python]
    severity: ERROR
    message: >-
      Cohere safety mode explicitly set to 'OFF', disabling all safety
      guardrails. Use 'STRICT' or 'CONTEXTUAL' instead. See
      https://docs.cohere.com/docs/safety-modes
    metadata:
      cwe: "CWE-693: Protection Mechanism Failure"
      category: security
      confidence: HIGH
      technology: [cohere]
      references:
        - https://docs.cohere.com/docs/safety-modes
    pattern: $CLIENT.chat(..., safety_mode="OFF", ...)

  - id: cohere-safety-mode-off-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Cohere safety mode explicitly set to 'OFF', disabling all safety
      guardrails. Use 'STRICT' or 'CONTEXTUAL' instead. See
      https://docs.cohere.com/docs/safety-modes
    metadata:
      cwe: "CWE-693: Protection Mechanism Failure"
      category: security
      confidence: HIGH
      technology: [cohere]
      references:
        - https://docs.cohere.com/docs/safety-modes
    pattern: |
      $CLIENT.chat({..., safetyMode: "OFF", ...})
