rules:
  - id: hooks-no-input-validation-python
    languages: [python]
    severity: WARNING
    message: >-
      Claude Code and Cursor hook reads stdin without input validation. Wrap json.loads/json.load
      calls in try/except to handle malformed or unexpected input gracefully.
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      category: security
      confidence: MEDIUM
      technology: [claude-code, cursor]
      references:
        - https://docs.anthropic.com/en/docs/claude-code/hooks
        - https://cursor.com/docs/agent/hooks
    patterns:
      - pattern-either:
          - pattern: json.loads(sys.stdin.read())
          - pattern: json.load(sys.stdin)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
  - id: hooks-no-input-validation-bash
    languages: [bash]
    severity: WARNING
    message: >-
      Piping untrusted input directly to eval, bash, or sh is dangerous in Claude Code
      and Cursor hooks. Validate and sanitize input before executing it.
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      category: security
      confidence: MEDIUM
      technology: [claude-code, cursor]
      references:
        - https://docs.anthropic.com/en/docs/claude-code/hooks
        - https://cursor.com/docs/agent/hooks
    pattern-either:
      - pattern: eval $...ARGS
      - pattern: echo $...ARGS | bash
      - pattern: echo $...ARGS | sh
