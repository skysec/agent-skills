rules:
  - id: ide-settings-executable-path-generic
    languages: [generic]
    severity: WARNING
    message: >-
      Executable path override detected in VS Code settings pointing to a
      project-relative path. A malicious repository can override interpreter or
      tool paths in workspace settings to execute arbitrary code when the project
      is opened. Use absolute system paths instead of relative paths for
      executable settings, and review .vscode/settings.json in untrusted repos.
    metadata:
      cwe: "CWE-94: Improper Control of Generation of Code"
      category: security
      confidence: MEDIUM
      subcategory: [vuln]
      technology: [vscode]
      references:
        - https://blog.vipyrsec.com/posts/idesaster/
    paths:
      include:
        - "**/settings.json"
        - "**/*.settings.json"
    pattern-regex: '"[^"]*(?:executablePath|ExecutablePath|defaultInterpreterPath|pythonPath|terminal\.integrated\.shell\.\w+)"\s*:\s*"\.\.?/'
