rules:
  - id: llm-api-key-in-source-python
    languages: [python]
    severity: ERROR
    message: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI
      provider (OpenAI, Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
      technology: [openai, anthropic, google, huggingface]
      references:
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    patterns:
      - pattern: $VAR = "$KEY"
      - metavariable-regex:
          metavariable: $KEY
          regex: ^(sk-[a-zA-Z0-9]{20,}|sk-ant-[a-zA-Z0-9-]{20,}|sk-proj-[a-zA-Z0-9-]{20,}|AIza[a-zA-Z0-9_-]{30,}|hf_[a-zA-Z0-9]{20,})

