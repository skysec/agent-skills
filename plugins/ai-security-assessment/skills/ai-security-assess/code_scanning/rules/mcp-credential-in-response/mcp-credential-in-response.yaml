rules:
  - id: mcp-credential-in-response-python
    languages: [python]
    severity: WARNING
    message: >-
      MCP tool returns a dictionary containing credential-like keys such as
      api_key, password, secret, or token. Exposing credentials in tool
      responses risks leaking them to the LLM context or logs. Remove
      sensitive fields before returning data from MCP tools.
    metadata:
      cwe: "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
      category: security
      confidence: MEDIUM
      subcategory: [vuln]
      technology: [mcp]
      references:
        - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    patterns:
      - pattern-inside: |
          @$SERVER.tool()
          def $FUNC(...):
              ...
      - pattern-either:
          - pattern: 'return {..., "api_key": $VAL, ...}'
          - pattern: 'return {..., "password": $VAL, ...}'
          - pattern: 'return {..., "secret": $VAL, ...}'
          - pattern: 'return {..., "token": $VAL, ...}'
          - pattern: 'return {..., "access_token": $VAL, ...}'
          - pattern: 'return {..., "secret_key": $VAL, ...}'
          - pattern: 'return {..., "private_key": $VAL, ...}'
