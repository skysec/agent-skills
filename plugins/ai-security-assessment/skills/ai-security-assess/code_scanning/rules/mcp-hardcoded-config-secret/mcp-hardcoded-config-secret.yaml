rules:
  - id: mcp-hardcoded-config-secret-generic
    languages: [generic]
    severity: ERROR
    message: >-
      Plaintext API key or token detected in MCP configuration file. Hardcoded
      secrets in config files risk exposure through version control or file
      sharing. Use environment variable references or a secrets manager instead.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
      subcategory: [vuln]
      technology: [mcp]
      references:
        - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    paths:
      include:
        - "*mcp*.json"
        - "claude_desktop_config.json"
    pattern-either:
      - pattern-regex: ':\s*"sk-[a-zA-Z0-9]{20,}"'
      - pattern-regex: ':\s*"sk-ant-[a-zA-Z0-9\-]{20,}"'
      - pattern-regex: ':\s*"sk-proj-[a-zA-Z0-9\-]{20,}"'
      - pattern-regex: ':\s*"hf_[a-zA-Z0-9]{20,}"'
      - pattern-regex: ':\s*"AIza[a-zA-Z0-9\-_]{20,}"'
