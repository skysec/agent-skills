rules:
  - id: mistral-missing-moderation
    languages: [python]
    severity: WARNING
    message: >-
      Mistral chat completion used without content moderation. Consider using
      the Moderation API (client.classifiers.moderate() or
      client.classifiers.moderate_chat()) to check content for harmful material.
      See https://docs.mistral.ai/capabilities/guardrailing/
    metadata:
      cwe: "CWE-693: Protection Mechanism Failure"
      category: security
      confidence: MEDIUM
      technology: [mistral]
      references:
        - https://docs.mistral.ai/capabilities/guardrailing/
    patterns:
      - pattern: $CLIENT.chat.complete(...)
      - pattern-inside: |
          def $FUNC(...):
              ...
      - pattern-not-inside: |
          def $FUNC(...):
              ...
              $CLIENT.classifiers.moderate(...)
              ...
      - pattern-not-inside: |
          def $FUNC(...):
              ...
              $CLIENT.classifiers.moderate_chat(...)
              ...
