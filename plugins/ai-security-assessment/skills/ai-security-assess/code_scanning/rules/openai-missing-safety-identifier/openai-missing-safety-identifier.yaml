rules:
  - id: openai-missing-safety-identifier-python
    languages: [python]
    severity: WARNING
    message: >-
      OpenAI Responses API called without 'safety_identifier' parameter. Include
      a hashed user identifier to enable abuse monitoring and safety checks. See
      https://developers.openai.com/api/docs/guides/safety-checks
    metadata:
      cwe: "CWE-693: Protection Mechanism Failure"
      category: security
      confidence: HIGH
      technology: [openai]
      references:
        - https://developers.openai.com/api/docs/guides/safety-checks/
    patterns:
      - pattern: $CLIENT.responses.create(...)
      - pattern-not: $CLIENT.responses.create(..., safety_identifier=$SID, ...)

  - id: openai-missing-safety-identifier-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      OpenAI Responses API called without 'safety_identifier' parameter. Include
      a hashed user identifier to enable abuse monitoring and safety checks. See
      https://developers.openai.com/api/docs/guides/safety-checks
    metadata:
      cwe: "CWE-693: Protection Mechanism Failure"
      category: security
      confidence: HIGH
      technology: [openai]
      references:
        - https://developers.openai.com/api/docs/guides/safety-checks/
    patterns:
      - pattern: "$CLIENT.responses.create({...})"
      - pattern-not: "$CLIENT.responses.create({..., safety_identifier: $SID, ...})"
