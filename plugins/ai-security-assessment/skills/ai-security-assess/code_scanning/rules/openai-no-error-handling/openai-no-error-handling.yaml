rules:
  - id: openai-no-error-handling
    languages: [python]
    severity: WARNING
    message: >-
      OpenAI API call without error handling. Wrap API calls in try/except to
      handle rate limits (RateLimitError), API errors (APIError), and network
      issues gracefully.
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      category: security
      confidence: MEDIUM
      technology: [openai]
      references:
        - https://developers.openai.com/api/docs/guides/safety-best-practices/
    patterns:
      - pattern: $CLIENT.chat.completions.create(...)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
  - id: openai-no-error-handling-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      OpenAI API call without error handling. Wrap API calls in try/catch to
      handle rate limits, API errors, and network issues gracefully.
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      category: security
      confidence: MEDIUM
      technology: [openai]
      references:
        - https://developers.openai.com/api/docs/guides/safety-best-practices/
    patterns:
      - pattern-either:
          - pattern: await $CLIENT.chat.completions.create({...})
          - pattern: $CLIENT.chat.completions.create({...})
      - pattern-not-inside: |
          try {
              ...
          } catch ($ERR) {
              ...
          }
