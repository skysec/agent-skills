# ==============================================================================
# AI Security Assessment Report
# Generated by: ai-security-assess skill
#
# Usage: fill every `null` field during the corresponding assessment phase.
# Allowed values are noted inline as comments where the set is constrained.
# ==============================================================================

assessment:

  # ----------------------------------------------------------------------------
  # METADATA
  # ----------------------------------------------------------------------------
  metadata:
    repository: null          # URI or local path to the assessed codebase
    commit: null              # full git commit hash of the code that was assessed
    date: null                # ISO 8601, e.g. "2026-03-21"
    assessed_by: "ai-security-assess"
    skill_version: "1.0"

  # ----------------------------------------------------------------------------
  # SYSTEM PROFILE
  # ----------------------------------------------------------------------------
  system:
    name: null                # project / product name
    description: null         # what this AI system does, who operates it, who uses it

    ai_components:

      agent:
        present: false
        frameworks: []        # e.g. [anthropic, openai, langchain, autogen, crewai, litellm]
        entry_points: []      # file paths / HTTP routes where the agent is invoked

      mcp_server:
        present: false
        transport: null       # stdio | http | sse
        tools: []             # names of every registered MCP tool
        entry_points: []      # server entrypoint files

      plugin_hook_extension:
        present: false
        platform: null        # claude-code | openai | langchain | autogen | crewai | generic
        components: []        # hook names, skill names, command names
        entry_points: []      # files that define or register hooks/skills

  # ----------------------------------------------------------------------------
  # ARCHITECTURE  (populated in Phase 1.1)
  # ----------------------------------------------------------------------------
  architecture:
    # Mermaid flowchart — replace the placeholder with the real diagram
    diagram: |
      flowchart TD
        User["User / Client"]
        Agent["Agent Orchestrator"]
        MCP["MCP Server(s)"]
        Backend["Backing Services"]
        User -->|"requests"| Agent
        Agent -->|"tool calls"| MCP
        MCP -->|"API / DB / FS"| Backend

    trust_boundaries:
      - boundary: null        # e.g. "User device ↔ Agent runtime"
        notes: null           # what crosses this boundary and how it is protected

    authn_mechanism: null     # e.g. "API key in header" | "OAuth 2.1 + PKCE" | "none (FINDING)"
    authz_mechanism: null     # e.g. "middleware" | "inline checks" | "absent (FINDING)"
    secrets_storage: null     # e.g. "env vars" | "AWS Secrets Manager" | "hardcoded (FINDING)"

  # ----------------------------------------------------------------------------
  # EXECUTIVE SUMMARY  (populated in Phase 3)
  # ----------------------------------------------------------------------------
  summary:
    overall_risk: null        # Critical | High | Medium | Low
    narrative: null           # 3-5 sentences: posture, highest-priority risks, key gaps

    risk_counts:
      threat_register:
        total: 0
        critical: 0
        high: 0
        medium: 0
        low: 0
      vulnerability_findings:
        total: 0
        critical: 0
        high: 0
        medium: 0
        low: 0
      mcp_compliance_violations: null   # integer, or null if no MCP server present

  # ----------------------------------------------------------------------------
  # RECOMMENDATIONS  (populated in Phase 3 — ordered by priority)
  # ----------------------------------------------------------------------------
  recommendations:
    - rank: 1
      id: null                # TM-NNN or VF-NNN
      title: null             # short finding title
      location: null          # file:line
      effort: null            # Low | Medium | High
      description: null       # what to do and why it is the most urgent item
    # add more entries as needed

  # ----------------------------------------------------------------------------
  # PHASE 0 — TRIAGE
  # ----------------------------------------------------------------------------
  phase_0_triage:

    manifests_reviewed: []    # e.g. ["pyproject.toml", "package.json", "go.mod"]
    architecture_docs_found: []

    entry_points:
      - type: null            # http-route | cli-command | cron | event-listener | mcp-tool | hook
        location: null        # file:line or URL pattern
        description: null

    critical_data_flows:
      - flow: null            # e.g. "user → agent → file-tool → host filesystem"
        risk_notes: null      # initial triage note on why this flow is sensitive

    scope:
      included: []
      excluded: []

  # ----------------------------------------------------------------------------
  # PHASE 1 — THREAT MODELING
  # ----------------------------------------------------------------------------
  phase_1_threat_modeling:

    # Phase 1.2 — Component Inventory
    component_inventory:
      - component: null
        type: null            # agent | mcp-server | mcp-client | data-store | external-api
        trust_zone: null      # user-device | public-internet | internal | privileged
        capabilities: []      # read | write | delete | execute | send | fetch
        data_handled: []      # e.g. [PII, secrets, embeddings, financial-records]
        credentials: null     # e.g. "OAuth 2.0 (broad scope)" | "API key (env var)" | "none"
        # MCP tools only — which of the 6 high-risk principles apply
        mcp_risk_principles: []  # [P1, P2, P3, P4, P5, P6] — see mcp_security/mcp_servers_principles.md
        risk_level: null      # HIGH | MEDIUM | LOW

    # Phase 1.3–1.5 — Threat Register
    threat_register:
      - id: "TM-001"
        code_location: null   # file:line
        component: null       # component name from inventory above

        threat_description: null

        # Phase 1.3 — OWASP / MITRE ATLAS tags
        # OWASP: Prompt Injection / Goal Hijacking | Broken Access Control |
        #        Insecure Design | Sensitive Data Exposure |
        #        Insecure Integration / Supply Chain | Security Misconfiguration
        owasp_category: null

        # MITRE ATLAS: Prompt Injection | Jailbreak / Safety Bypass |
        #              Tool Abuse / Tool-enabled Impact |
        #              Model-assisted Data Exfiltration | LLM Denial of Service
        mitre_atlas: null

        # Phase 1.4 — Risk Rating
        impact: null          # Critical | High | Medium | Low
        likelihood: null      # High | Medium | Low
        priority: null        # Critical | High | Medium | Low

        preconditions: null   # what must be true for this threat to be exploitable
        business_impact: null # legal, operational, or reputational consequence

        # Phase 1.5 — Mitigation Design
        proposed_mitigations: []  # specific code-level changes with file references

        linked_findings: []   # VF-NNN IDs from Phase 2 that confirm or refine this threat
        status: "Open"        # Open | In Progress | Resolved | Accepted

  # ----------------------------------------------------------------------------
  # PHASE 2 — CODE VULNERABILITY AUDIT
  # ----------------------------------------------------------------------------
  phase_2_code_audit:

    # Phase 2.1 — Automated Scan (Semgrep)
    semgrep:
      available: false
      rules_path: null        # absolute path to the rules/ directory used
      rules_applied: []       # rule IDs that were run
      raw_finding_count: 0    # total matches before contextual triage

    # Phase 2.1 + 2.2 — Vulnerability Findings (semgrep and manual combined)
    vulnerability_findings:
      - id: "VF-001"
        severity: null        # Critical | High | Medium | Low
        source: null          # semgrep | manual

        # semgrep rule ID (e.g. "mcp-command-injection") or manual pattern name
        rule_or_pattern: null

        file: null            # path/to/file.py:L42-L67
        component: null       # component name from Phase 1.2

        description: null     # what can go wrong here
        exploit_scenario: null  # concrete, step-by-step attack path
        impact: null          # technical and business consequences
        proposed_fix: null    # specific code change with file reference

        linked_threat: null   # TM-NNN this finding maps to (or null if new threat)

    # Phase 2.3 — MCP Requirements Spot Check (omit section if no MCP server)
    mcp_compliance:
      - req_id: null          # e.g. "MCP-REQ-001 (AD-1)"
        # Category codes: AD | AA | IV | SM | RI | SS | TD | LM | CH | TN | DP
        category: null
        control: null         # short description of the control being checked
        priority: null        # HIGH | LOW | INFO
        status: null          # PASS | FAIL | PARTIAL | N/A
        evidence: null        # code location or narrative explaining the status

  # ----------------------------------------------------------------------------
  # PHASE 3 — UNIFIED REPORT
  # ----------------------------------------------------------------------------
  phase_3_unified_report:

    # Critical and High findings cross-referenced from Phase 1 and Phase 2
    critical_high_findings:
      - id: null              # TM-NNN or VF-NNN
        finding: null         # one-line description
        location: null        # file:line
        priority: null        # Critical | High
        linked_ids: []        # other TM/VF IDs that confirm or relate to this finding

    # Narrative explaining how Semgrep results changed threat likelihood / impact ratings
    priority_rationalization: null

    scope:
      covered: null           # what was assessed (components, files, flows)
      excluded: null          # what was intentionally out of scope
